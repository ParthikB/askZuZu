<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Antenna stick -->
  <rect x="30" y="6" width="4" height="9" rx="2" fill="#0D9488"/>
  <!-- Antenna ball -->
  <circle cx="32" cy="5" r="5.5" fill="#FBBF24"/>

  <!-- Head shadow -->
  <rect x="8" y="15" width="50" height="42" rx="11" fill="#0F766E"/>
  <!-- Head -->
  <rect x="6" y="13" width="50" height="42" rx="11" fill="#0D9488"/>
  <!-- Head metallic highlight -->
  <rect x="10" y="16" width="20" height="6" rx="3" fill="#2DD4BF" opacity="0.4"/>

  <!-- Screen -->
  <rect x="10" y="19" width="42" height="30" rx="8" fill="#0F172A"/>
  <!-- Screen scanline -->
  <rect x="10" y="19" width="42" height="3" rx="2" fill="#1E293B" opacity="0.7"/>

  <!-- Left eye white -->
  <ellipse cx="22" cy="35" rx="6.5" ry="8.5" fill="white"/>
  <!-- Left pupil -->
  <ellipse cx="22" cy="36" rx="3.5" ry="4.5" fill="#0F172A"/>
  <!-- Left eye shine -->
  <circle cx="24" cy="33" r="1.5" fill="white"/>

  <!-- Right eye white -->
  <ellipse cx="42" cy="35" rx="6.5" ry="8.5" fill="white"/>
  <!-- Right pupil -->
  <ellipse cx="42" cy="36" rx="3.5" ry="4.5" fill="#0F172A"/>
  <!-- Right eye shine -->
  <circle cx="44" cy="33" r="1.5" fill="white"/>
</svg>
